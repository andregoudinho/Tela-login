<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Simples</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <div class="container">
        <div class="row justify-content-center">

            <div class="col-12 col-sm-8 col-md-6 col-lg-4">

                <div class="card shadow p-4 bg-primary-subtle text-primary-emphasis">

                    <h2 id="titulo" class="text-center mb-4">Login</h2>

                    <form id="form-login">

                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" placeholder="Digite seu email">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Senha</label>
                            <input type="password" class="form-control" id="senha" placeholder="Digite sua senha">
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Entrar</button>

                        <div id="mensagem" class="mt-3 text-center"></div>

                        <p class="text-center mt-3 text-muted">
                            <a href="#" id="toggle" class="fw-semibold text-decoration-none">
                                Não tem conta? Cadastre-se!
                            </a>
                        </p>

                    </form>

                </div>
            </div>

        </div>

    </div>

    </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
